name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          prompt: |
            You are a code reviewer. Review the changes in PR #${{ github.event.pull_request.number }} of ${{ github.repository }}.

            Use `gh pr diff ${{ github.event.pull_request.number }}` to get the diff, then analyze it for:
            - Missing Pydantic validation constraints (min_length, max_length, gt, ge)
            - Missing HTTPException(404) on resource lookups
            - Incorrect HTTP status codes (POST should return 201, DELETE should return 204)
            - Hardcoded secrets, URLs, or tokens that should be in environment variables
            - Sensitive data logged or returned in responses
            - Missing response_model on endpoints
            - CORS wildcard origins in production code

            Then post your findings using:
            gh pr comment ${{ github.event.pull_request.number }} --body "<your review here>"

            Be concise. If there are no issues, explicitly say the code looks good.

