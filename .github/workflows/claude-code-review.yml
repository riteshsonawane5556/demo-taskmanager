name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for proper diff context

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          prompt: |
            You are a senior code reviewer for a Python/FastAPI codebase.
            Review the pull request diff provided to you and check for:

            - Missing Pydantic validation constraints (min_length, max_length, gt, ge)
            - Missing HTTPException(status_code=404) on resource lookups
            - Incorrect HTTP status codes (POST → 201, DELETE → 204)
            - Hardcoded secrets, URLs, or tokens that should use environment variables
            - Sensitive data exposed in logs or API responses
            - FastAPI endpoints missing a response_model
            - CORS wildcard origins (*) in production configuration

            After completing your analysis, post your findings as a PR comment using:
            gh pr comment ${{ github.event.pull_request.number }} --body "$(cat <<'REVIEW'
            <your full markdown review here>
            REVIEW
            )"

            Format your response as a markdown comment with:
            - A brief summary at the top
            - Each issue as a bullet with file + line reference if possible
            - If no issues found, say so explicitly